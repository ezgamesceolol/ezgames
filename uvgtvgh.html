<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ezgames</title>
<style>
body {
font-family: Arial, sans-serif;
background: #1e1e1e;
color: #fff;
margin: 0;
padding: 0;
}

header {
background: #333;
padding: 20px;
text-align: center;
font-size: 32px;
font-weight: bold;
}

.games-container {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 20px;
padding: 30px;
}

.game-card {
background: #2b2b2b;
padding: 20px;
border-radius: 10px;
text-align: center;
transition: 0.3s;
}

.game-card:hover {
background: #444;
transform: scale(1.05);
}

.game-card button {
background: #00aaff;
border: none;
padding: 10px 20px;
color: #fff;
border-radius: 5px;
cursor: pointer;
margin-top: 10px;
}

.game-card button:hover {
background: #0088cc;
}

.page {
display: none;
text-align: center;
padding: 20px;
}

.back-btn {
padding: 10px 20px;
background: #00aaff;
border: none;
color: white;
border-radius: 5px;
cursor: pointer;
margin-top: 20px;
}

.back-btn:hover {
background: #0088cc;
}
</style>

<script>
function showPage(pageId) {
document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
document.getElementById(pageId).style.display = 'block';
window.scrollTo(0, 0);
}
</script>
</head>
<body>

<header>ezgames</header>

<!-- HOME PAGE -->
<div id="home" class="page" style="display:block;">
<div class="games-container">

<div class="game-card">
<h2>rileys scratch profile</h2>
<p>follow me plz</p>
<button onclick="window.location.href='https://scratch.mit.edu/users/Proboyclipzz_Roblox'">Go</button>
</div>

<div class="game-card">
<h2>Geometry Dash</h2>
<p>Play this Scratch game!</p>
<button onclick="showPage('game2')">Play</button>
</div>

<div class="game-card">
<h2>Fortnite</h2>
<p>Play Fortnite on GeForce NOW</p>
<button onclick="window.open('https://play.geforcenow.com/games?game-id=46bfab06-d864-465d-9e56-2d9e45cdee0a')">Play</button>
</div>

<div class="game-card">
<h2>Proxy #1</h2>
<p>gas.education</p>
<button onclick="window.open('https://gas.education')">Open</button>
</div>

<div class="game-card">
<h2>Proxy #2</h2>
<p>courses.happyrobotics.com</p>
<button onclick="window.open('https://courses.happyrobotics.com')">Open</button>
</div>

<div class="game-card">
<h2>Roblox</h2>
<p>Play Roblox Cloud Gaming</p>
<button onclick="window.open('https://www.easyfun.gg/cloud-games/roblox.html')">Play</button>
</div>

</div>
</div>

<!-- GAME 2 PAGE -->
<div id="game2" class="page">
<h1>Geometry Dash</h1>

<iframe
src="https://scratch.mit.edu/projects/161103557/embed"
width="485" height="402" frameborder="0" scrolling="no" allowfullscreen>
</iframe>

<br>
<button class="back-btn" onclick="showPage('home')">Back to Home</button>
</div>

</body>
</html>
